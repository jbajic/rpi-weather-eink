# Weather e-ink display configuration.

[location]
city = "Zagreb"
country = "HR"      # optional ISO country code to disambiguate the city

[units]
temperature = "celsius"   # celsius | fahrenheit
wind = "kmh"              # kmh | ms | mph | kn
precipitation = "mm"      # mm | inch

[display]
model = "epd7in5_v2"
rotation = 0

# Standard Waveshare e-Paper HAT wiring (BCM GPIO numbers).
[display.pins]
reset = 17
dc = 25
busy = 24

[refresh]
interval_minutes = 60

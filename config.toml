# Weather e-ink display configuration.

# Weather data source: "open-meteo" (default) or "met-no" (Norwegian
# Meteorological Institute / Yr.no). Both are free and need no API key.
provider = "met-no"

# UI language: "en" or "hr" (Croatian uses ASCII for diacritics: c/z/s/d).
language = "hr"

[location]
city = "Osijek"
country = "HR"      # optional ISO country code to disambiguate the city

[units]
temperature = "celsius"   # celsius | fahrenheit
wind = "kmh"              # kmh | ms | mph | kn
precipitation = "mm"      # mm | inch

[display]
model = "epd7in5_v2"
rotation = 0
invert = true            # set true if the panel shows white-on-black (inverted)

# Standard Waveshare e-Paper HAT wiring (BCM GPIO numbers).
[display.pins]
reset = 17
dc = 25
busy = 24
power = 18               # PWR enable on newer HATs; set 255 to disable

[refresh]
# How often to re-render. Applied to the systemd timer by deploy.sh.
interval_minutes = 20

[health]
# Expose a minimal /health HTTP endpoint (reports 200 while refreshes are
# succeeding, 503 once the last success goes stale). Enabled by default;
# set enabled = false to turn it off.
enabled = true
listen = "0.0.0.0:8080"
